<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Tokenised NASDAQ Shell</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.cdnfonts.com/css/digitalix" rel="stylesheet">
  <style>
    :root {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f1f5f9;
      background: #050910;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), transparent), #050910;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #0c1424;
      border-right: 1px solid rgba(148, 163, 184, 0.2);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .logo {
      font-size: 1.4rem;
      letter-spacing: 0.4em;
      color: #94a3b8;
    }

    .wallet-status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.75);
      color: #cbd5f5;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .wallet-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
    }

    .wallet-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
    }

    .wallet-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .wallet-label {
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.7rem;
      color: #94a3b8;
    }

    .wallet-account {
      font-weight: 600;
      color: #e2e8f0;
      font-size: 0.75rem;
      word-break: break-all;
    }

    .wallet-hint {
      font-size: 0.7rem;
      color: #94a3b8;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 14px;
      color: #cbd5f5;
      transition: background 0.2s ease;
    }

    .nav a.active {
      background: rgba(59, 130, 246, 0.18);
      color: #8fb5ff;
    }

    .nav a:hover {
      background: rgba(148, 163, 184, 0.18);
    }

    .nav a.nav-link-disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: rgba(15, 23, 42, 0.35);
      color: #7c8aa5;
      pointer-events: none;
    }

    .nav a.nav-link-disabled:hover {
      background: rgba(15, 23, 42, 0.35);
    }

    .nav-toggle-btn {
      margin-top: 6px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid transparent;
      color: #e2e8f0;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .nav-toggle-btn.enabled {
      background: rgba(22, 163, 74, 0.22);
      border-color: rgba(22, 163, 74, 0.5);
      color: #86efac;
    }

    .nav-toggle-btn.disabled {
      background: rgba(220, 38, 38, 0.22);
      border-color: rgba(220, 38, 38, 0.45);
      color: #fca5a5;
    }

    .nav-toggle-btn:hover {
      filter: brightness(1.05);
    }

    .notification-panel {
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.7);
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .notification-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #cbd5f5;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .notification-clear-btn {
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: transparent;
      color: #94a3b8;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .notification-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      max-height: 230px;
      overflow: auto;
    }

    .notification-item {
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(10, 17, 30, 0.7);
    }

    .notification-title {
      color: #e2e8f0;
      font-size: 0.76rem;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .notification-msg {
      color: #94a3b8;
      font-size: 0.72rem;
      line-height: 1.25;
      word-break: break-word;
    }

    .notification-time {
      color: #6b7a91;
      font-size: 0.66rem;
      margin-top: 4px;
    }

    .notification-empty {
      color: #7c8aa5;
      font-size: 0.73rem;
    }
    .sidebar footer {
      margin-top: auto;
      border: 1px dashed rgba(148, 163, 184, 0.4);
      border-radius: 16px;
      padding: 16px;
      color: #94a3b8;
      font-size: 0.85rem;
    }

    .content {
      flex: 1;
      padding: 32px;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      overflow: hidden;
    }

    header h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    header p {
      margin: 4px 0 0;
      color: #94a3b8;
    }

    .badge {
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .index-tape-shell {
      width: 100%;
      min-height: 56px;
      border-radius: 14px;
      background: rgba(10, 17, 30, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.22);
      overflow: hidden;
      position: relative;
    }

    .index-tape-track {
      display: inline-flex;
      align-items: center;
      gap: 30px;
      padding: 10px 20px;
      width: max-content;
      white-space: nowrap;
      animation: ticker-roll 36s linear infinite;
    }

    .index-tape-shell:hover .index-tape-track {
      animation-play-state: paused;
    }

    .index-tape-item {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      color: #e2e8f0;
    }

    .index-label {
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
      font-weight: 700;
    }

    .index-price {
      font-size: 1.5rem;
      line-height: 1;
      font-weight: 700;
      font-family: "Digitalix", "Space Grotesk", sans-serif;
    }

    .index-change {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .index-up {
      color: #22c55e;
    }

    .index-down {
      color: #ef4444;
    }

    .index-flat {
      color: #cbd5e1;
    }

    @keyframes ticker-roll {
      0% {
        transform: translateX(0%);
      }
      100% {
        transform: translateX(-50%);
      }
    }

    .card {
      margin-top: 32px;
      flex: 1;
      background: rgba(10, 17, 30, 0.85);
      border-radius: 28px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 32px;
      box-shadow: 0 20px 50px rgba(2, 6, 23, 0.6);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .modules {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .module {
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.75);
    }

    .module h3 {
      margin: 0 0 6px;
      font-size: 1rem;
      color: #e2e8f0;
    }

    .module p {
      margin: 0;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    @media (max-width: 960px) {
      .app-shell {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
      }

      .sidebar footer {
        width: 100%;
      }

      .index-price {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="logo">TOKENISED NASDAQ</div>
      <div class="wallet-status" id="wallet-status" role="button" aria-label="Connect wallet">
        <span class="wallet-dot" id="wallet-dot"></span>
        <div class="wallet-text">
          <span class="wallet-label">Wallet</span>
          <span class="wallet-account" id="wallet-account">Not connected</span>
          <span class="wallet-hint" id="wallet-hint">Connect wallet to unlock all features</span>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-link active" href="#" data-page="markets">Markets</a>
        <a class="nav-link" href="#" data-page="portfolio">Portfolio</a>
        <a class="nav-link" href="#" data-page="transactions">Transactions</a>
        <a class="nav-link" href="#" data-page="ttoken">Token Factory</a>
        <a class="nav-link" href="#" data-page="trade">Trade</a>
        <a class="nav-link" href="#" data-page="award">Award</a>
        <a class="nav-link" href="#" data-page="gas">Gas</a>
        <a id="admin-nav-link" class="nav-link" href="#" data-page="admin" style="display:none;">Admin</a>
        <button id="live-updates-toggle" class="nav-toggle-btn enabled" type="button" style="display:none;">Live updates: Enabled</button>
      </nav>
      <section class="notification-panel" aria-live="polite">
        <div class="notification-head">
          <span>Notifications</span>
          <button id="notification-clear-btn" class="notification-clear-btn" type="button">Clear</button>
        </div>
        <ul id="notification-list" class="notification-list">
          <li class="notification-empty">No notifications yet</li>
        </ul>
      </section>
    </aside>

    <main class="content">
      <header>
        <div class="index-tape-shell">
          <div id="index-tape-track" class="index-tape-track">
            <span class="index-label">Loading US stock ticker</span>
          </div>
        </div>
      </header>

      <section class="card">
        <iframe
          id="page-frame"
          src="/chart.html"
          name="tokenised-stock-info"
          title="Stock information module"
          loading="lazy"
          style="width: 100%; min-height: 1200px; border: 0; border-radius: 24px; background: #0b1020;"
        ></iframe>
      </section>
    </main>
  </div>
  <script>
    const walletStatus = document.getElementById("wallet-status");
    const walletDot = document.getElementById("wallet-dot");
    const walletAccount = document.getElementById("wallet-account");
    const walletHint = document.getElementById("wallet-hint");
    const pageFrame = document.getElementById("page-frame");
    const navLinks = document.querySelectorAll(".nav-link");
    const adminNavLink = document.getElementById("admin-nav-link");
    const liveUpdatesToggle = document.getElementById("live-updates-toggle");
    const indexTapeTrack = document.getElementById("index-tape-track");
    const notificationList = document.getElementById("notification-list");
    const notificationClearBtn = document.getElementById("notification-clear-btn");
    const LAST_PAGE_KEY = "tlse_last_page";
    const NOTIFY_EVENT_KEY = "tlse:notify";
    const NOTIFY_STORE_KEY = "tlse:notifications";
    const NOTIFY_LIMIT = 12;
    const INDEX_TICKER_ROLL_MS = 36000;
    let liveUpdatesEnabled = true;
    let activeEthereumProvider = null;
    let currentWalletAddress = "";
    let adminFeaturesEnabled = false;
    let shellNotifications = [];
    const NOTIFY_DUP_WINDOW_MS = 30000;
    const ORDER_FILL_POLL_MS = 30000;
    let orderFillPoller = null;
    let walletOrderNotifyState = {
      wallet: "",
      initialized: false,
      seenFillKeys: new Set(),
      knownOrderInfoById: new Map(),
    };

    function hasConnectedWallet() {
      return typeof currentWalletAddress === "string" && currentWalletAddress.trim().length > 0;
    }

    function findEthereumProvider() {
      const rootProvider = window.ethereum;
      if (rootProvider.providers && Array.isArray(rootProvider.providers)) {
        let metamaskProvider = rootProvider.providers[0];
        for (let i = 0; i < rootProvider.providers.length; i++) {
          const provider = rootProvider.providers[i];
          if (provider && provider.isMetaMask) {
            metamaskProvider = provider;
          }
        }
        return metamaskProvider;
      }

      return rootProvider;
    }

    activeEthereumProvider = findEthereumProvider();

    function normalizeAccounts(rawAccounts) {
      let accounts = [];
      if (Array.isArray(rawAccounts)) {
        accounts = rawAccounts;
      }
      return accounts;
    }

    function chooseDisplayAccount(provider, rawAccounts) {
      const accounts = normalizeAccounts(rawAccounts);
      let selectedAddress = "";
      if (provider && provider.selectedAddress) {
        selectedAddress = String(provider.selectedAddress);
      }

      if (selectedAddress) {
        const selectedLower = selectedAddress.toLowerCase();
        for (let i = 0; i < accounts.length; i++) {
          const account = String(accounts[i]);
          if (account.toLowerCase() === selectedLower) {
            return account;
          }
        }
      }

      if (accounts.length > 0) {
        return String(accounts[0]);
      }
      return "";
    }

    function readNotificationStore() {
      try {
        const raw = localStorage.getItem(NOTIFY_STORE_KEY);
        if (!raw) {
          return [];
        }
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) {
          return [];
        }
        return dedupeNotificationRows(parsed);
      } catch {
        return [];
      }
    }

    function writeNotificationStore(rows) {
      try {
        localStorage.setItem(NOTIFY_STORE_KEY, JSON.stringify(rows));
      } catch {
      }
    }

    function formatNotificationTime(timestampMs) {
      const ms = Number(timestampMs);
      if (!Number.isFinite(ms) || ms <= 0) {
        return "";
      }
      try {
        return new Date(ms).toLocaleString();
      } catch {
        return "";
      }
    }

    function sanitizeNotificationMessage(rawMessage) {
      let text = rawMessage ? String(rawMessage) : "";
      text = text.replace(/\s*\|\s*tx\s+0x[a-fA-F0-9]{64}\b/gi, "");
      text = text.replace(/\btx\s+0x[a-fA-F0-9]{64}\b/gi, "");
      text = text.replace(/\b0x[a-fA-F0-9]{64}\b/g, "");
      return text.trim();
    }

    function buildNotificationFingerprint(input) {
      const title = input && input.title ? String(input.title).trim().toLowerCase() : "";
      const message = input && input.message ? String(input.message).trim().toLowerCase() : "";
      const wallet = input && input.wallet ? String(input.wallet).trim().toLowerCase() : "";
      return `${title}|${message}|${wallet}`;
    }

    function dedupeNotificationRows(rows) {
      const next = [];
      const idSet = new Set();
      const fpMap = new Map();
      for (let i = 0; i < rows.length; i += 1) {
        const rowRaw = rows[i];
        if (!rowRaw || typeof rowRaw !== "object") {
          continue;
        }
        const row = {
          id: rowRaw.id ? String(rowRaw.id) : "",
          title: rowRaw.title ? String(rowRaw.title) : "Notification",
          message: sanitizeNotificationMessage(rowRaw.message),
          wallet: rowRaw.wallet ? String(rowRaw.wallet) : "",
          timestampMs: Number(rowRaw.timestampMs) || Date.now(),
        };
        if (row.id) {
          if (idSet.has(row.id)) {
            continue;
          }
          idSet.add(row.id);
        }
        const fp = buildNotificationFingerprint(row);
        const prevTs = fpMap.get(fp);
        if (typeof prevTs === "number") {
          const diff = Math.abs(row.timestampMs - prevTs);
          if (diff <= NOTIFY_DUP_WINDOW_MS) {
            continue;
          }
        }
        fpMap.set(fp, row.timestampMs);
        next.push(row);
        if (next.length >= NOTIFY_LIMIT) {
          break;
        }
      }
      return next;
    }

    function renderNotifications() {
      if (!notificationList) {
        return;
      }
      notificationList.innerHTML = "";
      const visibleRows = [];
      if (Array.isArray(shellNotifications) && hasConnectedWallet()) {
        for (let i = 0; i < shellNotifications.length; i += 1) {
          const row = shellNotifications[i];
          const wallet = row && row.wallet ? String(row.wallet).toLowerCase() : "";
          if (wallet && wallet === currentWalletAddress.toLowerCase()) {
            visibleRows.push(row);
          }
        }
      }
      if (!Array.isArray(visibleRows) || visibleRows.length === 0) {
        const empty = document.createElement("li");
        empty.className = "notification-empty";
        empty.textContent = "No notifications yet";
        notificationList.appendChild(empty);
        return;
      }
      for (let i = 0; i < visibleRows.length; i += 1) {
        const row = visibleRows[i];
        const item = document.createElement("li");
        item.className = "notification-item";
        const title = row.title ? String(row.title) : "Notification";
        const message = row.message ? String(row.message) : "";
        const timeText = formatNotificationTime(row.timestampMs);
        item.innerHTML = `<div class="notification-title">${title}</div><div class="notification-msg">${message}</div><div class="notification-time">${timeText}</div>`;
        notificationList.appendChild(item);
      }
    }

    function refreshNotificationsFromStore() {
      shellNotifications = readNotificationStore();
      renderNotifications();
    }

    function pushShellNotification(input) {
      if (!input || typeof input !== "object") {
        return;
      }
      const rowIdRaw = input.id ? String(input.id) : "";
      const row = {
        id: rowIdRaw,
        title: input.title ? String(input.title) : "Notification",
        message: sanitizeNotificationMessage(input.message),
        wallet: input.wallet ? String(input.wallet) : "",
        timestampMs: Number(input.timestampMs) || Date.now(),
      };
      if (!row.wallet) {
        return;
      }
      if (!hasConnectedWallet()) {
        return;
      }
      if (row.wallet.toLowerCase() !== currentWalletAddress.toLowerCase()) {
        return;
      }
      if (row.id) {
        for (let i = 0; i < shellNotifications.length; i += 1) {
          if (String(shellNotifications[i].id || "") === row.id) {
            return;
          }
        }
      }
      const fp = buildNotificationFingerprint(row);
      for (let i = 0; i < shellNotifications.length; i += 1) {
        const existing = shellNotifications[i];
        const existingFp = buildNotificationFingerprint(existing);
        if (existingFp !== fp) {
          continue;
        }
        const existingTs = Number(existing.timestampMs) || 0;
        const nextTs = Number(row.timestampMs) || 0;
        const diff = Math.abs(nextTs - existingTs);
        if (diff <= NOTIFY_DUP_WINDOW_MS) {
          return;
        }
      }
      shellNotifications.unshift(row);
      if (shellNotifications.length > NOTIFY_LIMIT) {
        shellNotifications = shellNotifications.slice(0, NOTIFY_LIMIT);
      }
      shellNotifications = dedupeNotificationRows(shellNotifications);
      writeNotificationStore(shellNotifications);
      renderNotifications();
    }

    function toTokenAmountText(weiText) {
      const value = Number(weiText) / 1e18;
      if (!Number.isFinite(value)) {
        return "0.00";
      }
      return value.toFixed(2);
    }

    function resetOrderFillWatcherState(wallet) {
      walletOrderNotifyState = {
        wallet: wallet ? String(wallet).toLowerCase() : "",
        initialized: false,
        seenFillKeys: new Set(),
        knownOrderInfoById: new Map(),
      };
    }

    async function pollOrderFillNotifications() {
      if (!hasConnectedWallet()) {
        return;
      }
      const wallet = currentWalletAddress.toLowerCase();
      if (walletOrderNotifyState.wallet !== wallet) {
        resetOrderFillWatcherState(wallet);
      }
      try {
        const [ordersRes, fillsRes] = await Promise.all([
          fetch(`/api/orders/open?wallet=${encodeURIComponent(currentWalletAddress)}`),
          fetch(`/api/orderbook/fills?wallet=${encodeURIComponent(currentWalletAddress)}&limit=50&fast=1`),
        ]);
        if (!ordersRes.ok || !fillsRes.ok) {
          return;
        }
        const ordersData = await ordersRes.json();
        const fillsData = await fillsRes.json();
        let openOrders = [];
        if (Array.isArray(ordersData.orders)) {
          openOrders = ordersData.orders;
        }
        let fills = [];
        if (Array.isArray(fillsData.fills)) {
          fills = fillsData.fills;
        }

        const openById = new Map();
        for (let i = 0; i < openOrders.length; i += 1) {
          const order = openOrders[i];
          const id = Number(order.id);
          if (!Number.isFinite(id) || id <= 0) {
            continue;
          }
          openById.set(id, order);
          walletOrderNotifyState.knownOrderInfoById.set(id, {
            side: String(order.side || "").toUpperCase(),
            symbol: String(order.symbol || "").toUpperCase(),
          });
        }

        if (!walletOrderNotifyState.initialized) {
          for (let i = 0; i < fills.length; i += 1) {
            const row = fills[i];
            const txHash = String(row.txHash || "");
            const logIndex = Number(row.logIndex || 0);
            const makerId = Number(row.makerId || 0);
            const takerId = Number(row.takerId || 0);
            if (makerId > 0) {
              walletOrderNotifyState.seenFillKeys.add(`${txHash}:${logIndex}:maker:${makerId}`);
            }
            if (takerId > 0) {
              walletOrderNotifyState.seenFillKeys.add(`${txHash}:${logIndex}:taker:${takerId}`);
            }
          }
          walletOrderNotifyState.initialized = true;
          return;
        }

        for (let i = fills.length - 1; i >= 0; i -= 1) {
          const row = fills[i];
          const txHash = String(row.txHash || "");
          const logIndex = Number(row.logIndex || 0);
          const symbol = String(row.symbol || "").toUpperCase();
          const priceCents = Number(row.priceCents || 0);
          const qtyText = toTokenAmountText(String(row.qty || "0"));
          const makerTrader = String(row.makerTrader || "").toLowerCase();
          const takerTrader = String(row.takerTrader || "").toLowerCase();
          const makerId = Number(row.makerId || 0);
          const takerId = Number(row.takerId || 0);
          const events = [];
          if (makerId > 0 && makerTrader === wallet) {
            events.push({ role: "maker", orderId: makerId });
          }
          if (takerId > 0 && takerTrader === wallet) {
            events.push({ role: "taker", orderId: takerId });
          }
          for (let j = 0; j < events.length; j += 1) {
            const event = events[j];
            const fillKey = `${txHash}:${logIndex}:${event.role}:${event.orderId}`;
            if (walletOrderNotifyState.seenFillKeys.has(fillKey)) {
              continue;
            }
            walletOrderNotifyState.seenFillKeys.add(fillKey);
            const openOrder = openById.get(event.orderId);
            const known = walletOrderNotifyState.knownOrderInfoById.get(event.orderId);
            const side = openOrder
              ? String(openOrder.side || "").toUpperCase()
              : (known ? known.side : "");
            const resolvedSymbol = symbol || (openOrder ? String(openOrder.symbol || "").toUpperCase() : (known ? known.symbol : ""));
            const completionText = openOrder ? "partially completed" : "fully completed";
            const priceText = Number.isFinite(priceCents) && priceCents > 0 ? `$${(priceCents / 100).toFixed(2)}` : "-";
            const sideText = side ? `${side} ` : "";
            pushShellNotification({
              id: `fill:${fillKey}`,
              title: `Order ${completionText}`,
              message: `${resolvedSymbol} ${sideText}order #${event.orderId} ${completionText}: ${qtyText} filled at ${priceText}`,
              wallet: currentWalletAddress,
              timestampMs: Number(row.timestampMs) || Date.now(),
            });
          }
        }
      } catch {
      }
    }

    function startOrderFillWatcher() {
      if (orderFillPoller) {
        clearInterval(orderFillPoller);
        orderFillPoller = null;
      }
      if (!hasConnectedWallet()) {
        return;
      }
      resetOrderFillWatcherState(currentWalletAddress);
      pollOrderFillNotifications();
      orderFillPoller = setInterval(pollOrderFillNotifications, ORDER_FILL_POLL_MS);
    }

    function applyAdminFeatureVisibility() {
      if (adminNavLink) {
        const shouldShowAdmin = adminFeaturesEnabled && hasConnectedWallet();
        adminNavLink.style.display = shouldShowAdmin ? "inline-flex" : "none";
      }
      if (!adminFeaturesEnabled && pageFrame.title === "Admin") {
        loadPage("markets");
      }
    }

    function applyWalletLockedNavigation() {
      const connected = hasConnectedWallet();
      for (let i = 0; i < navLinks.length; i++) {
        const link = navLinks[i];
        const page = String(link.dataset.page || "");
        const isMarkets = page === "markets";
        const isAdmin = page === "admin";
        const shouldLock = !connected && !isMarkets;
        const shouldHide = isAdmin && (!connected || !adminFeaturesEnabled);
        link.classList.toggle("nav-link-disabled", shouldLock);
        link.setAttribute("aria-disabled", shouldLock ? "true" : "false");
        link.title = shouldLock ? "Connect wallet to unlock this page" : "";
        link.style.display = shouldHide ? "none" : "inline-flex";
      }
    }

    async function refreshGlobalLiveUpdates() {
      try {
        const res = await fetch("/api/live-updates/status");
        const data = await res.json();
        if (res.ok && data) {
          setLiveUpdatesEnabled(data.enabled !== false);
          return;
        }
      } catch {
      }
      // Fail open to keep prices updating when status endpoint is unavailable.
      setLiveUpdatesEnabled(true);
    }

    async function refreshUiPermissions() {
      if (!hasConnectedWallet()) {
        adminFeaturesEnabled = false;
        applyAdminFeatureVisibility();
        applyWalletLockedNavigation();
        return;
      }
      try {
        const res = await fetch(`/api/ui/permissions?wallet=${encodeURIComponent(currentWalletAddress)}`);
        const data = await res.json();
        if (res.ok && data && data.canAccessAdminPage === true) {
          adminFeaturesEnabled = true;
        } else {
          adminFeaturesEnabled = false;
        }
      } catch {
        adminFeaturesEnabled = false;
      }
      applyAdminFeatureVisibility();
      applyWalletLockedNavigation();
    }

    async function refreshWalletFromProvider() {
      const accounts = await activeEthereumProvider.request(
        {
          method: "eth_accounts",
        }
      );
      const account = chooseDisplayAccount(activeEthereumProvider, accounts);
      currentWalletAddress = account;
      setWalletStatus(hasConnectedWallet(), account);
      await refreshUiPermissions();
    }

    async function reconnectWalletInteractive() {
      activeEthereumProvider = findEthereumProvider();
      await activeEthereumProvider.request(
        {
          method: "wallet_requestPermissions",
          params: [{ eth_accounts: {} }],
        }
      );

      const accounts = await activeEthereumProvider.request(
        {
          method: "eth_requestAccounts",
        }
      );
      const account = chooseDisplayAccount(activeEthereumProvider, accounts);
      currentWalletAddress = account;
      setWalletStatus(hasConnectedWallet(), account);
      await refreshUiPermissions();
    }

    function setWalletStatus(connected, account) {
      if (connected) {
        walletDot.classList.add("connected");
        walletAccount.textContent = account;
        walletHint.textContent = "Connected";
      } else {
        walletDot.classList.remove("connected");
        walletAccount.textContent = "Not connected";
        walletHint.textContent = "Connect wallet to unlock all features";
      }
    }

    function setActiveNav(page) {
      for (let i = 0; i < navLinks.length; i++) {
        const link = navLinks[i];
        link.classList.toggle("active", link.dataset.page === page);
      }
    }

    function loadPage(page) {
      let pageToStore = "markets";
      if (page) {
        pageToStore = String(page);
      }
      if (!hasConnectedWallet() && pageToStore !== "markets") {
        pageToStore = "markets";
      }
      if (pageToStore === "admin" && !adminFeaturesEnabled) {
        pageToStore = "markets";
      }
      localStorage.setItem(LAST_PAGE_KEY, pageToStore);
      // iframe scr switch
      if (pageToStore === "ttoken") {
        pageFrame.src = "/ttoken.html";
        pageFrame.title = "Token Factory";
        setActiveNav("ttoken");
        return;
      }
      if (pageToStore === "portfolio") {
        pageFrame.src = "/portfolio.html";
        pageFrame.title = "Portfolio";
        setActiveNav("portfolio");
        return;
      }
      if (pageToStore === "transactions") {
        pageFrame.src = "/transactions.html";
        pageFrame.title = "Transactions";
        setActiveNav("transactions");
        return;
      }
      if (pageToStore === "trade") {
        pageFrame.src = "/trade.html";
        pageFrame.title = "Trade";
        setActiveNav("trade");
        return;
      }
      if (pageToStore === "admin") {
        pageFrame.src = "/admin.html";
        pageFrame.title = "Admin";
        setActiveNav("admin");
        return;
      }
      if (pageToStore === "award") {
        pageFrame.src = "/award.html";
        pageFrame.title = "Award";
        setActiveNav("award");
        return;
      }
      if (pageToStore === "gas") {
        pageFrame.src = "/gas.html";
        pageFrame.title = "Gas";
        setActiveNav("gas");
        return;
      }
      pageFrame.src = "/chart.html";
      pageFrame.title = "Stock information module";
      setActiveNav("markets");
    }

    function formatTickerPrice(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) {
        return "-";
      }
      return `$${number.toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      })}`;
    }

    function formatTickerPercent(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) {
        return "-";
      }
      const pct = number * 100;
      let sign = "";
      if (pct > 0) {
        sign = "+";
      }
      return `${sign}${pct.toFixed(2)}%`;
    }

    function buildTickerMarkup(rows) {
      let html = "";
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        const changePercent = Number(row.changePercent);
        let changeClass = "index-flat";
        if (changePercent > 0) {
          changeClass = "index-up";
        } else if (changePercent < 0) {
          changeClass = "index-down";
        }
        let label = "";
        if (row.symbol) {
          label = String(row.symbol);
        } else {
          if (row.label) {
            label = String(row.label);
          }
        }
        if (label.startsWith("^")) {
          label = label.slice(1);
        }
        const priceText = formatTickerPrice(row.price);
        const changeText = formatTickerPercent(changePercent);
        html += `<span class="index-tape-item"><span class="index-label">${label}</span><span class="index-price ${changeClass}">${priceText}</span><span class="index-change ${changeClass}">${changeText}</span></span>`;
      }
      return html;
    }

    async function loadIndexTicker() {
      try {
        const res = await fetch("/api/fmp/index-ticker");
        const data = await res.json();
        let hasRows = false;
        if (data) {
          if (Array.isArray(data.rows)) {
            if (data.rows.length > 0) {
              hasRows = true;
            }
          }
        }
        if (!res.ok || !hasRows) {
          return;
        }
        const first = buildTickerMarkup(data.rows);
        const second = buildTickerMarkup(data.rows);
        indexTapeTrack.innerHTML = `${first}${second}`;
      } catch (err) {
      }
    }

    function setLiveUpdatesEnabled(enabled) {
      liveUpdatesEnabled = enabled;
      if (enabled) {
        liveUpdatesToggle.textContent = "Live updates: Enabled";
      } else {
        liveUpdatesToggle.textContent = "Live updates: Disabled";
      }
      liveUpdatesToggle.classList.toggle("enabled", enabled);
      liveUpdatesToggle.classList.toggle("disabled", !enabled);
      if (pageFrame && pageFrame.contentWindow) {
      pageFrame.contentWindow.postMessage(
        {
          type: "LIVE_UPDATES",
          enabled: enabled,
        },
        "*"
      );
      }
    }

    function notifyCurrentPageWalletChanged() {
      if (!pageFrame || !pageFrame.contentWindow) {
        return;
      }
      pageFrame.contentWindow.postMessage(
        {
          type: "WALLET_CHANGED",
          wallet: currentWalletAddress,
        },
        "*"
      );
    }

    for (let i = 0; i < navLinks.length; i++) {
      const link = navLinks[i];
      link.addEventListener("click", (event) => {
        event.preventDefault();
        const targetPage = String(link.dataset.page || "");
        if (!hasConnectedWallet() && targetPage !== "markets") {
          return;
        }
        loadPage(link.dataset.page);
      });
    }

    window.addEventListener("storage", (event) => {
      if (event.key === NOTIFY_EVENT_KEY && event.newValue) {
        try {
          const payload = JSON.parse(event.newValue);
          pushShellNotification(payload);
        } catch {
        }
      }
      if (event.key === NOTIFY_STORE_KEY) {
        shellNotifications = readNotificationStore();
        renderNotifications();
      }
    });

    window.addEventListener("message", (event) => {
      const payload = event.data;
      if (!payload || payload.type !== "SHELL_NOTIFY") {
        return;
      }
      pushShellNotification(payload.payload || {});
    });

    notificationClearBtn.addEventListener("click", () => {
      shellNotifications = [];
      writeNotificationStore(shellNotifications);
      renderNotifications();
    });

    (async function () {
      try {
        // connction to wallet and listens for changes
        await refreshWalletFromProvider();
        startOrderFillWatcher();
        refreshNotificationsFromStore();
      } catch (err) {
        currentWalletAddress = "";
        setWalletStatus(false);
        await refreshUiPermissions();
        refreshNotificationsFromStore();
      }
    })();
    activeEthereumProvider.on("accountsChanged", async (accounts) => {
      const account = chooseDisplayAccount(activeEthereumProvider, accounts);
      currentWalletAddress = account;
      setWalletStatus(hasConnectedWallet(), account);
      await refreshUiPermissions();
      if (!hasConnectedWallet()) {
        loadPage("markets");
      }
      startOrderFillWatcher();
      refreshNotificationsFromStore();
      notifyCurrentPageWalletChanged();
    });
    walletStatus.addEventListener("click", async () => {
      try {
        await reconnectWalletInteractive();
        await refreshUiPermissions();
        startOrderFillWatcher();
        refreshNotificationsFromStore();
        notifyCurrentPageWalletChanged();
      } catch (err) {
        currentWalletAddress = "";
        setWalletStatus(false);
        await refreshUiPermissions();
        refreshNotificationsFromStore();
      }
    });
    let startPage = localStorage.getItem(LAST_PAGE_KEY);
    if (!startPage) {
      startPage = "markets";
    }
    loadPage(startPage);
    applyAdminFeatureVisibility();
    applyWalletLockedNavigation();
    shellNotifications = readNotificationStore();
    renderNotifications();

    window.addEventListener("focus", () => {
      refreshNotificationsFromStore();
    });
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        refreshNotificationsFromStore();
      }
    });

    liveUpdatesToggle.addEventListener("click", () => {
      // Control moved to Admin page.
    });

    pageFrame.addEventListener("load", () => {
      refreshGlobalLiveUpdates();
    });

    refreshGlobalLiveUpdates();
    setInterval(refreshGlobalLiveUpdates, 2000);
    loadIndexTicker();
    setInterval(loadIndexTicker, INDEX_TICKER_ROLL_MS);
  </script>
</body>

</html>
